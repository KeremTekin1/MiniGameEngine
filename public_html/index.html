<!DOCTYPE html>
<html>
    <head>
        <title>WebGL2 Game Engine</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            body { 
                margin: 0; 
                overflow: hidden; 
                background-color: #333; 
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }
            canvas { display: block; width: 100vw; height: 100vh; }

            /* --- BİLGİ KUTUSU BURADA --- */
            #controls-info {
                position: absolute;
                top: 340px; 
                left: 20px;
                color: #eee;
                background-color: rgba(0, 0, 0, 0.6);
                padding: 15px;
                border-radius: 8px;
                pointer-events: none;
                user-select: none;
                font-size: 14px;
                border-left: 4px solid #00d2ff;
            }

            .key {
                display: inline-block;
                background: #333;
                border: 1px solid #777;
                border-radius: 4px;
                padding: 2px 6px;
                margin: 0 2px;
                font-weight: bold;
                color: #fff;
                font-family: monospace;
                box-shadow: 0 2px 0 #000;
            }

            h3 { margin-top: 0; color: #00d2ff; font-size: 16px; text-transform: uppercase; margin-bottom: 10px; }
            p { margin: 8px 0; }
            .sub-text { font-size: 12px; color: #aaa; margin-top: 10px; font-style: italic; line-height: 1.4; }
            b { color: #fff; }
        </style>
        
        <script src="libs/gl-matrix-min.js"></script>
    </head>
    <body>
        <canvas id="glCanvas"></canvas>

        <div id="controls-info">
            <h3>Info</h3>
            
            <p><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> : Move</p>
            <p><span class="key">Space</span> / <span class="key">Shift</span> : Up / Down</p>
            <p><span class="key">Mouse Left Click</span> : Rotate Camera</p>
            <p><span class="key">T</span> : Toggle Texture Mode</p>
            <p><span class="key">C</span> : Change Rotation Direction</p>
            
            <div class="sub-text">
                * Use the right panel to Toggle <b>Mini-Map</b><br>
                * Use the right panel for <b>Auto-Rotate</b>
            </div>
        </div>
        <script type="module" src="src/main.js"></script>
    </body>
</html>
